name: CI

on:
  pull_request:
    branches: [ main, staging ]
  push:
    branches: [ main, staging ]

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  security:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn audit --level high
      - run: npx audit-ci --high

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn test --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ lint, test, sonarqube ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn build

  e2e:
    name: E2E / BDD Tests
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - name: Checkout work-order-service
        uses: actions/checkout@v4
        with:
          path: fiap-13soat-auto-repair-shop-work-order-service

      - name: Checkout local-env
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-13soat-auto-repair-shop-local-env
          path: fiap-13soat-auto-repair-shop-local-env

      - name: Checkout customer-vehicle-service
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-13soat-auto-repair-shop-customer-vehicle-service
          path: fiap-13soat-auto-repair-shop-customer-vehicle-service

      - name: Checkout billing-service
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-13soat-auto-repair-shop-billing-service
          path: fiap-13soat-auto-repair-shop-billing-service

      - name: Checkout execution-service
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/fiap-13soat-auto-repair-shop-execution-service
          path: fiap-13soat-auto-repair-shop-execution-service

      - name: Start full environment
        working-directory: fiap-13soat-auto-repair-shop-local-env
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: fiap-13soat-auto-repair-shop-work-order-service/yarn.lock

      - name: Install dependencies
        working-directory: fiap-13soat-auto-repair-shop-work-order-service
        run: yarn install --frozen-lockfile

      - name: Run e2e tests
        working-directory: fiap-13soat-auto-repair-shop-work-order-service
        run: yarn test:e2e
        env:
          GATEWAY_HOST: localhost
          GATEWAY_PORT: 8080

      - name: Collect container logs on failure
        if: failure()
        working-directory: fiap-13soat-auto-repair-shop-local-env
        run: docker compose logs --no-color

      - name: Teardown
        if: always()
        working-directory: fiap-13soat-auto-repair-shop-local-env
        run: docker compose down -v
