name: CD - Staging

on:
  push:
    branches: [ staging ]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: auto-repair-shop/work-order-service
  EKS_CLUSTER: auto-repair-shop-cluster

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:staging .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{
          env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/work-order-service \
            work-order-service=${{ steps.build-image.outputs.image }} \
            -n staging
          kubectl rollout status deployment/work-order-service -n staging --timeout=300s

      - name: Smoke test
        run: |
          SERVICE_URL=$(kubectl get svc work-order-service -n staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$SERVICE_URL/health || echo "000")
            if [ "$STATUS" = "200" ]; then echo "Smoke test passed"; exit 0; fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back"
          kubectl rollout undo deployment/work-order-service -n staging
          kubectl rollout status deployment/work-order-service -n staging --timeout=120s
