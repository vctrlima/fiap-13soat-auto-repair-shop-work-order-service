apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-order-service
  labels:
    app: work-order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: work-order-service
  template:
    metadata:
      labels:
        app: work-order-service
    spec:
      serviceAccountName: auto-repair-shop-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: work-order-service
          image: auto-repair-shop/work-order-service:latest
          ports:
            - containerPort: 3002
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: work-order-service-config
            - secretRef:
                name: work-order-service-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
